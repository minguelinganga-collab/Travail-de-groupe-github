<body>

<header>
    <h1>GlobalWeather</h1>
</header>

<main>

    <!-- ici c'est le formulaire a remplir pour les villes et la localisation-->

        <label for="input">Ville :</label>

        placeholder="Entrez le nom d'une ville..." required>

        <button type="submit" id="search">Recherche</button>
        <button type="button" id="btnGeo">Localisation</button>

        <p id="erreur"></p>

    </form>

    <!-- ici c'est la carte meteo -->
    <section id="dashboard">
        <p id="messagevide">
            <strong> </strong>
        </p>
    </section>

</main>

<script src="script.js"></script>
